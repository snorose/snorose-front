name: 'Auto Assign and Set Issue Type'

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened]

jobs:
  automation:
    runs-on: ubuntu-latest
    steps:
      - name: Auto Assign and Set Issue Type
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.ISSUE_AUTOMIZATION }}
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue ? context.payload.issue.number : context.payload.pull_request.number;
            const author = context.payload.issue ? context.payload.issue.user.login : context.payload.pull_request.user.login;
            const title = (context.payload.issue ? context.payload.issue.title : context.payload.pull_request.title) || '';
            const node_id = context.payload.issue ? context.payload.issue.node_id : context.payload.pull_request.node_id;

            // 1. 담당자 지정 (이슈 & PR 공통)
            try {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number,
                assignees: [author]
              });
              console.log(`[Success] Assigned author: ${author}`);
            } catch (e) {
              console.log(`[Error] Failed to assign author: ${e.message}`);
            }

            // 2. 이슈 타입 설정 (이슈인 경우에만)
            if (context.payload.issue) {
              let targetTypeStr = 'Task';
              if (title.toUpperCase().includes('[FEAT]')) targetTypeStr = 'Feature';
              else if (title.toUpperCase().includes('[BUG]') || title.toUpperCase().includes('[FIX]')) targetTypeStr = 'Bug';

              try {
                const typeQuery = `
                  query getIssueTypes($owner: String!, $name: String!) {
                    repository(owner: $owner, name: $name) {
                      issueTypes(first: 10) {
                        nodes {
                          id
                          name
                        }
                      }
                    }
                  }
                `;

                const repoData = await github.graphql(typeQuery, { owner, name: repo });
                const issueTypes = repoData.repository.issueTypes.nodes;
                const matchedType = issueTypes.find(t => t.name.toLowerCase() === targetTypeStr.toLowerCase());

                if (matchedType) {
                  const mutation = `
                    mutation updateIssueType($issueId: ID!, $issueTypeId: ID!) {
                      updateIssue(input: {id: $issueId, issueTypeId: $issueTypeId}) {
                        issue { id }
                      }
                    }
                  `;
                  await github.graphql(mutation, {
                    issueId: node_id,
                    issueTypeId: matchedType.id
                  });
                  console.log(`[Success] Issue type set to: ${matchedType.name}`);
                }
              } catch (e) {
                console.log('[Warning] Issue Type automation failed. This might be a personal repo or feature not enabled.');
              }
            }
